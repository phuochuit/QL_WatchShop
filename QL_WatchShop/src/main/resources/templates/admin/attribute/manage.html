<!DOCTYPE html>
<html th:replace="~{layout/admin_layout :: main_layout('Quản lý Thuộc tính Sản phẩm', ~{:: #attr-content})}" xmlns:th="http://www.thymeleaf.org">
<body>

<div id="attr-content">
    <style>
        .custom-container { max-width: 500px; margin: 40px auto; background: white; padding: 30px 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header-title { text-align: center; color: #2c3e50; margin-top: 0; font-size: 24px; margin-bottom: 25px; border-bottom: 2px solid #f1f2f6; padding-bottom: 15px;}
        .form-group { margin-bottom: 20px; }
        label { font-weight: 600; display: block; margin-bottom: 8px; color: #34495e; font-size: 14px;}
        select, input[type="text"] { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 6px; box-sizing: border-box; font-size: 15px; transition: border-color 0.3s; }
        select:focus, input[type="text"]:focus { outline: none; border-color: #3498db; box-shadow: 0 0 5px rgba(52, 152, 219, 0.3); }
        .checkbox-group { display: flex; align-items: center; gap: 10px; padding: 10px; background-color: #f1f2f6; border-radius: 6px; cursor: pointer; margin-top: 5px; }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }
        .btn-submit { background-color: #2980b9; color: white; padding: 14px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: background-color 0.3s; margin-top: 10px; }
        .btn-submit:hover { background-color: #2471a3; }
        .alert-success { background-color: #d4edda; color: #155724; padding: 15px; border-radius: 6px; text-align: center; margin-bottom: 20px; border: 1px solid #c3e6cb; font-weight: 500;}
        .back-link { display: block; text-align: center; margin-top: 25px; font-size: 14px; text-decoration: none; color: #7f8c8d; font-weight: 600; transition: color 0.3s;}
        .back-link:hover { color: #2c3e50; }
    </style>

    <div class="custom-container">
        <h2 class="header-title">⚙️ THÊM THUỘC TÍNH SẢN PHẨM</h2>

        <div th:if="${param.success}" class="alert-success">
            ✅ Đã lưu thuộc tính mới thành công!
        </div>

        <form id="dynamicForm" action="/admin/attributes/category/add" method="post">
            <div class="form-group">
                <label>Bạn muốn thêm gì?</label>
                <select id="attributeSelect" onchange="changeFormMode()">
                    <option value="category">🏷️ Danh mục</option>
                    <option value="brand">⭐ Thương hiệu</option>
                    <option value="movement">⚙️ Loại máy</option>
                    <option value="material">🔗 Chất liệu dây</option>
                </select>
            </div>

            <div class="form-group">
                <label id="inputLabel">Tên danh mục mới</label>
                <input type="text" name="name" id="nameInput" required placeholder="Nhập tên tại đây...">
            </div>

            <div class="form-group checkbox-group" id="hotCheckboxDiv" style="display: none;">
                <input type="checkbox" name="isHot" value="true" id="isHotCheck">
                <label for="isHotCheck" style="margin-bottom: 0; cursor: pointer;">Đánh dấu là thương hiệu HOT 🔥</label>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">LƯU DANH MỤC</button>
        </form>

        <a href="/admin/product/add" class="back-link">⬅️ Quay lại trang Thêm Sản Phẩm</a>
    </div>

    <script>
        function changeFormMode() {
            const selectBox = document.getElementById("attributeSelect");
            const form = document.getElementById("dynamicForm");
            const label = document.getElementById("inputLabel");
            const btn = document.getElementById("submitBtn");
            const hotDiv = document.getElementById("hotCheckboxDiv");
            const checkbox = document.getElementById("isHotCheck");
            const mode = selectBox.value;

            checkbox.checked = false;

            if (mode === "category") {
                form.action = "/admin/attributes/category/add";
                label.innerText = "Tên danh mục mới";
                btn.innerText = "LƯU DANH MỤC";
                hotDiv.style.display = "none";
            } else if (mode === "brand") {
                form.action = "/admin/attributes/brand/add";
                label.innerText = "Tên thương hiệu mới";
                btn.innerText = "LƯU THƯƠNG HIỆU";
                hotDiv.style.display = "flex";
            } else if (mode === "movement") {
                form.action = "/admin/attributes/movement/add";
                label.innerText = "Tên loại máy mới";
                btn.innerText = "LƯU LOẠI MÁY";
                hotDiv.style.display = "none";
            } else if (mode === "material") {
                form.action = "/admin/attributes/material/add";
                label.innerText = "Tên chất liệu dây mới";
                btn.innerText = "LƯU CHẤT LIỆU";
                hotDiv.style.display = "none";
            }
        }
    </script>
</div>

</body>
</html>
