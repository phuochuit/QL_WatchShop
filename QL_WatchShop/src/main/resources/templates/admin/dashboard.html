<!DOCTYPE html>
<html th:replace="~{layout/admin_layout :: main_layout('Bảng điều khiển', ~{:: #dashboard-content})}" xmlns:th="http://www.thymeleaf.org">
<body>

<div id="dashboard-content">
    <div class="container">
        <h2 style="margin: 0 0 20px 0; color: #2c3e50;">📊 BẢNG ĐIỀU KHIỂN (DASHBOARD)</h2>
        <p style="color: #7f8c8d; margin-bottom: 30px;">Chào mừng Admin quay trở lại hệ thống quản trị Watch Shop!</p>

        <div style="display: flex; gap: 20px; margin-bottom: 30px;">

            <div style="flex: 1; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid #3498db;">
                <h4 style="margin: 0 0 10px 0; color: #7f8c8d; font-size: 14px;">TỔNG DOANH THU</h4>
                <h2 style="margin: 0; color: #2c3e50; font-size: 28px;" th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</h2>
            </div>

            <div style="flex: 1; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid #2ecc71;">
                <h4 style="margin: 0 0 10px 0; color: #7f8c8d; font-size: 14px;">ĐƠN MỚI (CHỜ XỬ LÝ)</h4>
                <h2 style="margin: 0; color: #2c3e50; font-size: 28px;" th:text="${newOrdersCount}">0</h2>
            </div>

            <div style="flex: 1; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid #e74c3c;">
                <h4 style="margin: 0 0 10px 0; color: #7f8c8d; font-size: 14px;">TỔNG SẢN PHẨM</h4>
                <h2 style="margin: 0; color: #2c3e50; font-size: 28px;" th:text="${totalProducts}">0</h2>
            </div>

        </div>

        <div style="background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
            <h3 style="margin: 0 0 20px 0; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px;">🚀 Hoạt động gần đây</h3>

            <div th:if="${#lists.isEmpty(recentOrders)}" style="color: #999; font-style: italic;">
                Hệ thống chưa có hoạt động nào...
            </div>

            <table th:if="${!#lists.isEmpty(recentOrders)}" style="width: 100%; border-collapse: collapse;">
                <tbody>
                <tr th:each="order : ${recentOrders}" style="border-bottom: 1px solid #f1f1f1;">
                    <td style="padding: 15px 0;">
                        <span style="font-weight: bold; color: #3498db;" th:text="'Đơn hàng #' + ${order.id}"></span>
                        từ khách hàng <strong th:text="${order.user != null ? order.user.fullName : 'Khách vãng lai'}"></strong>
                    </td>
                    <td style="padding: 15px 0; text-align: right; color: #7f8c8d;" th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                    <td style="padding: 15px 0; text-align: right;">
                        <span th:if="${order.status == 'PENDING'}" style="background: #f39c12; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;">Chờ xử lý</span>
                        <span th:if="${order.status == 'SHIPPING'}" style="background: #3498db; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;">Đang giao</span>
                        <span th:if="${order.status == 'COMPLETED'}" style="background: #27ae60; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;">Hoàn thành</span>
                        <span th:if="${order.status == 'CANCELLED'}" style="background: #e74c3c; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;">Đã hủy</span>
                    </td>
                </tr>
                </tbody>
            </table>

            <div style="margin-top: 20px; text-align: right;">
                <a th:href="@{/admin/order}" style="color: #3498db; text-decoration: none; font-weight: bold; font-size: 14px;">Xem tất cả đơn hàng →</a>
            </div>
        </div>

    </div>
</div>

</body>
</html>
