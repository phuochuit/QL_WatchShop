<!DOCTYPE html>
<html th:replace="~{layout/admin_layout :: main_layout('Quản lý Người Dùng', ~{:: #main-content})}" xmlns:th="http://www.thymeleaf.org">
<body>

<div id="main-content">
  <div class="container">
    <h2 style="margin: 0 0 20px 0; color: #2c3e50;">👥 QUẢN LÝ NGƯỜI DÙNG</h2>

    <div th:if="${successMessage}" style="background: #d4edda; color: #155724; padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #c3e6cb;">
      <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" style="background: #f8d7da; color: #721c24; padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #f5c6cb;">
      <span th:text="${errorMessage}"></span>
    </div>

    <table>
      <thead>
      <tr>
        <th>ID</th>
        <th>Họ Tên</th>
        <th>Email (Tài khoản)</th>
        <th>SĐT</th>
        <th>Vai trò</th>
        <th>Trạng thái</th>
        <th>Hành động</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="u : ${users}">
        <td th:text="${u.id}">1</td>
        <td style="font-weight: bold; color: #2c3e50;" th:text="${u.fullName}">Nguyễn Văn A</td>
        <td th:text="${u.email}">admin@gmail.com</td>
        <td th:text="${u.phone != null ? u.phone : 'Chưa cập nhật'}">0123456789</td>

        <td>
          <span th:if="${u.role == 'ADMIN'}" style="color: #c0392b; font-weight: bold;">👑 Quản trị viên</span>
          <span th:if="${u.role == 'USER'}" style="color: #2980b9; font-weight: bold;">👤 Khách hàng</span>
        </td>

        <td>
          <span th:if="${u.isActive}" style="background: #27ae60; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;">Bình thường</span>
          <span th:if="${!u.isActive}" style="background: #7f8c8d; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;">Đã bị khóa</span>
        </td>

        <td>
          <form th:action="@{/admin/user/toggle-status}" method="post" style="margin: 0;">
            <input type="hidden" name="id" th:value="${u.id}">

            <button th:if="${u.isActive}" type="submit"
                    style="background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;"
                    onclick="return confirm('Bạn có chắc chắn muốn KHÓA tài khoản này? Khách hàng sẽ không thể đăng nhập.');">
              🔒 Khóa
            </button>

            <button th:if="${!u.isActive}" type="submit"
                    style="background: #27ae60; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;"
                    onclick="return confirm('Bạn có muốn MỞ KHÓA lại cho tài khoản này không?');">
              🔓 Mở khóa
            </button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
