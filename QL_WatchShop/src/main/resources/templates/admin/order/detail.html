<!DOCTYPE html>
<html th:replace="~{layout/admin_layout :: main_layout('Chi tiết Đơn Hàng', ~{:: #detail-content})}" xmlns:th="http://www.thymeleaf.org">
<body>

<div id="detail-content">
  <div class="container" style="max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h2 style="margin:0; color: #2c3e50;">🧾 CHI TIẾT ĐƠN HÀNG <span th:text="'#' + ${order.id}"></span></h2>
      <a href="/admin/order" style="text-decoration: none; color: #007bff; font-weight: bold;">← Quay lại danh sách</a>
    </div>

    <div th:if="${successMessage}" style="background: #d4edda; color: #155724; padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #c3e6cb;">
      ✅ <span th:text="${successMessage}"></span>
    </div>

    <div style="display: flex; gap: 20px; margin-bottom: 30px;">
      <div style="flex: 1; border: 1px solid #eee; padding: 20px; border-radius: 8px; background: #f8f9fa;">
        <h4 style="margin-top: 0; border-bottom: 1px solid #ddd; padding-bottom: 10px;">👤 Thông tin khách hàng</h4>
        <p><strong>Tên:</strong> <span th:text="${order.user != null ? order.user.fullName : 'N/A'}"></span></p>
        <p><strong>Ngày đặt:</strong> <span th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span></p>
        <p><strong>Địa chỉ & SĐT:</strong> <span th:text="${order.shippingAddress}"></span></p>
        <p><strong>Thanh toán:</strong> <span th:text="${order.paymentMethod}"></span></p>
      </div>

      <div style="flex: 1; border: 1px solid #eee; padding: 20px; border-radius: 8px; background: #f8f9fa;">
        <h4 style="margin-top: 0; border-bottom: 1px solid #ddd; padding-bottom: 10px;">⚙️ Xử lý đơn hàng</h4>

        <form th:action="@{/admin/order/update-status}" method="post">
          <input type="hidden" name="id" th:value="${order.id}">
          <div style="margin-bottom: 15px;">
            <label style="font-weight: bold; display: block; margin-bottom: 5px;">Trạng thái hiện tại:</label>
            <select name="status" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc; font-weight: bold;">
              <option value="PENDING" th:selected="${order.status == 'PENDING'}">🟠 Chờ xử lý</option>
              <option value="SHIPPING" th:selected="${order.status == 'SHIPPING'}">🔵 Đang giao hàng</option>
              <option value="COMPLETED" th:selected="${order.status == 'COMPLETED'}">🟢 Đã hoàn thành</option>
              <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">🔴 Đã hủy</option>
            </select>
          </div>
          <button type="submit" style="background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%;">
            💾 CẬP NHẬT TRẠNG THÁI
          </button>
        </form>
      </div>
    </div>

    <h4 style="margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px;">🛒 Danh sách sản phẩm</h4>
    <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
      <thead>
      <tr style="background: #eee;">
        <th style="padding: 12px; text-align: left;">Sản phẩm</th>
        <th style="padding: 12px; text-align: center;">Đơn giá</th>
        <th style="padding: 12px; text-align: center;">Số lượng</th>
        <th style="padding: 12px; text-align: right;">Thành tiền</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="detail : ${orderDetails}" style="border-bottom: 1px solid #eee;">
        <td style="padding: 12px; display: flex; align-items: center; gap: 15px;">
          <img th:src="${!#lists.isEmpty(detail.product.images) ? (detail.product.images[0].localImageUrl != null ? detail.product.images[0].localImageUrl : detail.product.images[0].imageUrl) : ''}" style="width: 50px; height: 50px; object-fit: contain; border: 1px solid #ddd; border-radius: 4px;">
          <strong th:text="${detail.product.name}"></strong>
        </td>
        <td style="padding: 12px; text-align: center;" th:text="${#numbers.formatDecimal(detail.price, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
        <td style="padding: 12px; text-align: center;" th:text="${detail.quantity}"></td>
        <td style="padding: 12px; text-align: right; font-weight: bold; color: #e74c3c;" th:text="${#numbers.formatDecimal(detail.price * detail.quantity, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
      </tr>
      </tbody>
    </table>

    <div style="text-align: right; font-size: 18px;">
      Tổng cộng: <strong style="color: #c0392b; font-size: 24px;" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'"></strong>
    </div>

  </div>
</div>

</body>
</html>
