<!DOCTYPE html>
<html th:replace="~{layout/admin_layout :: main_layout('Quản lý Đơn Hàng', ~{:: #main-content})}" xmlns:th="http://www.thymeleaf.org">
<body>

<div id="main-content">
  <div class="container">
    <h2 style="margin: 0 0 20px 0; color: #2c3e50;">📦 QUẢN LÝ ĐƠN HÀNG</h2>

    <table>
      <thead>
      <tr>
        <th>Mã Đơn</th>
        <th>Khách Hàng</th>
        <th>Ngày Đặt</th>
        <th>Tổng Tiền</th>
        <th>Trạng Thái</th>
        <th>Hành Động</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="order : ${orders}">
        <td style="font-weight: bold;" th:text="'#' + ${order.id}">#1</td>
        <td>
          <strong th:text="${order.user != null ? order.user.fullName : 'Khách vãng lai'}"></strong><br>
          <small style="color: #666;" th:text="${order.shippingAddress}"></small>
        </td>
        <td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
        <td style="color: #e74c3c; font-weight: bold;" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
        <td>
          <span th:if="${order.status == 'PENDING'}" style="background: #f39c12; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;">CHỜ XỬ LÝ</span>
          <span th:if="${order.status == 'SHIPPING'}" style="background: #3498db; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;">ĐANG GIAO</span>
          <span th:if="${order.status == 'COMPLETED'}" style="background: #27ae60; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;">HOÀN THÀNH</span>
          <span th:if="${order.status == 'CANCELLED'}" style="background: #e74c3c; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;">ĐÃ HỦY</span>
        </td>
        <td>
          <a th:href="@{'/admin/order/' + ${order.id}}" class="btn-edit" style="background: #2980b9;">👁️ Xem & Xử lý</a>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
