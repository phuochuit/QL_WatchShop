<!DOCTYPE html>
<html th:replace="~{layout/web_layout :: main_web_layout('Đổi mật khẩu', ~{:: #change-password-content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>

<div id="change-password-content">
    <style>
        .password-container { max-width: 500px; margin: 50px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .page-title { color: #2c3e50; font-size: 22px; margin-bottom: 25px; text-align: center; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        .form-control:focus { border-color: #e74c3c; outline: none; box-shadow: 0 0 5px rgba(231,76,60,0.2); }

        .btn-submit { background: #e74c3c; color: white; border: none; width: 100%; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-submit:hover { background: #c0392b; }

        .alert { padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; }
        .alert-danger { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>

    <div class="password-container">
        <h2 class="page-title">🔑 ĐỔI MẬT KHẨU</h2>

        <div th:if="${errorMessage}" class="alert alert-danger">
            ⚠️ <span th:text="${errorMessage}"></span>
        </div>

        <div th:if="${successMessage}" class="alert alert-success">
            ✅ <span th:text="${successMessage}"></span>
        </div>

        <form th:action="@{/user/change-password}" method="post">
            <div class="form-group">
                <label>Mật khẩu hiện tại</label>
                <input type="password" name="oldPassword" class="form-control" placeholder="Nhập mật khẩu cũ" required>
            </div>

            <hr style="border: none; border-top: 1px dashed #eee; margin: 25px 0;">

            <div class="form-group">
                <label>Mật khẩu mới</label>
                <input type="password" name="newPassword" class="form-control" placeholder="Nhập mật khẩu mới" required>
            </div>

            <div class="form-group">
                <label>Xác nhận mật khẩu mới</label>
                <input type="password" name="confirmPassword" class="form-control" placeholder="Nhập lại mật khẩu mới" required>
            </div>

            <button type="submit" class="btn-submit">CẬP NHẬT MẬT KHẨU</button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <a th:href="@{/user/profile}" style="color: #3498db; text-decoration: none; font-size: 14px;">← Quay lại Thông tin cá nhân</a>
        </div>
    </div>
</div>

</body>
</html>
