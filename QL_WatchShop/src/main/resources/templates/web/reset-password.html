<!DOCTYPE html>
<html th:replace="~{layout/web_layout :: main_web_layout('Đặt lại mật khẩu', ~{:: #reset-content})}" xmlns:th="http://www.thymeleaf.org">
<body>

<div id="reset-content">
    <div style="max-width: 450px; margin: 60px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); text-align: center;">
        <h2 style="color: #2c3e50; margin-top: 0;">🔑 MẬT KHẨU MỚI</h2>
        <p style="color: #7f8c8d; margin-bottom: 25px; font-size: 14px;">
            Tài khoản: <strong th:text="${session.resetEmail}" style="color: #333;"></strong>
        </p>

        <div th:if="${error}" style="background: #f8d7da; color: #721c24; padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 14px;">
            ⚠️ <span th:text="${error}"></span>
        </div>

        <form th:action="@{/reset-password}" method="post">
            <input type="password" name="password" placeholder="Nhập mật khẩu mới" required
                   style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">

            <input type="password" name="confirmPassword" placeholder="Nhập lại mật khẩu mới" required
                   style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">

            <button type="submit" style="background: #27ae60; color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px;">LƯU MẬT KHẨU</button>
        </form>
    </div>
</div>

</body>
</html>
