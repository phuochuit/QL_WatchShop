<!DOCTYPE html>
<html th:replace="~{layout/web_layout :: main_web_layout('Quên mật khẩu', ~{:: #forgot-content})}" xmlns:th="http://www.thymeleaf.org">
<body>

<div id="forgot-content">
  <div style="max-width: 450px; margin: 60px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); text-align: center;">
    <h2 style="color: #2c3e50; margin-top: 0;">🔐 QUÊN MẬT KHẨU</h2>
    <p style="color: #7f8c8d; margin-bottom: 25px; font-size: 14px;">Vui lòng nhập địa chỉ Email bạn đã đăng ký để đặt lại mật khẩu.</p>

    <div th:if="${error}" style="background: #f8d7da; color: #721c24; padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 14px;">
      ⚠️ <span th:text="${error}"></span>
    </div>

    <form th:action="@{/forgot-password}" method="post">
      <input type="email" name="email" placeholder="Nhập địa chỉ Email của bạn" required
             style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">

      <button type="submit" style="background: #e74c3c; color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px;">TIẾP TỤC</button>
    </form>

    <div style="margin-top: 20px;">
      <a th:href="@{/login}" style="color: #3498db; text-decoration: none; font-size: 14px;">← Quay lại trang Đăng nhập</a>
    </div>
  </div>
</div>

</body>
</html>
